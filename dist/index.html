        function printRows(meta, rows) {
          var s = getSession();
          var parishName = (s && (s.parishName || s.parish_name || (s.user && s.user.parish_name))) || '';
          var filterLine = [
            prbFilter.from ? 'From ' + fmtDate(prbFilter.from) : '',
            prbFilter.to   ? 'To ' + fmtDate(prbFilter.to)     : '',
            prbFilter.status ? 'Status: ' + prbFilter.status   : '',
            prbFilter.search ? 'Search: ' + prbFilter.search   : ''
          ].filter(Boolean).join(' · ');
          var head = '<tr>' + meta.cols.map(function (c) { return '<th>' + escapeHtml(c.head) + '</th>'; }).join('') + '</tr>';
          var body = (rows || []).map(function (r) {
            return '<tr>' + meta.cols.map(function (c) {
              var v = r[c.key];
              if (c.fmt === 'date') return '<td>' + fmtDate(v) + '</td>';
              return '<td>' + escapeHtml(v == null ? '' : String(v).replace(/<[^>]+>/g, '')) + '</td>';
            }).join('') + '</tr>';
          }).join('');

          var html =
            '<!doctype html><html><head><meta charset="utf-8"><title>' + escapeHtml(meta.label) + '</title>' +
            '<style>' +
              'body{font:13px/1.5 system-ui,sans-serif;color:#0f172a;padding:24px;}' +
              'h1{font:700 20px/1.2 system-ui;margin:0 0 4px;}' +
              '.meta{color:#475569;margin-bottom:16px;font-size:12px;}' +
              'table{width:100%;border-collapse:collapse;}' +
              'th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #e2e8f0;}' +
              'th{background:#f1f5f9;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#475569;}' +
              'tfoot td{font-size:11px;color:#64748b;padding-top:12px;border-top:2px solid #cbd5e1;}' +
              '@media print { body{padding:0;} .noprint{display:none;} }' +
            '</style></head><body>' +
              '<h1>' + escapeHtml(meta.label) + '</h1>' +
              '<div class="meta">' + escapeHtml(parishName) + (filterLine ? ' — ' + escapeHtml(filterLine) : '') + '</div>' +
              '<table><thead>' + head + '</thead><tbody>' + body + '</tbody>' +
              '<tfoot><tr><td colspan="' + meta.cols.length + '">Generated ' + fmtDate(new Date().toISOString()) + ' · ' + (rows || []).length + ' record(s)</td></tr></tfoot>' +
              '</table>' +
            '</body></html>';

          var w = window.open('', '_blank', 'width=960,height=720');
          if (!w) return;
          w.document.open(); w.document.write(html); w.document.close();
          w.focus();
          setTimeout(function () { try { w.print(); } catch (e) {} }, 400);
        }

        function printSummary() {
          var card = findReportsCard();
          if (!card) return;
          var pid = parishIdFromSession();
          if (!pid) return;
          var s = getSession();
          var parishName = (s && (s.parishName || s.parish_name || (s.user && s.user.parish_name))) || '';

          // Summary tiles (count snapshot at top of the print).
          var tiles = card.querySelectorAll(".prb-tile");
          var summaryItems = Array.prototype.map.call(tiles, function (t) {
            return {
              label: (t.querySelector(".prb-tile__label") || {}).textContent || '',
              value: (t.querySelector(".prb-tile__value") || {}).textContent || '0'
            };
          });

          var filterLine = [
            prbFilter.from ? 'From ' + fmtDate(prbFilter.from) : '',
            prbFilter.to   ? 'To ' + fmtDate(prbFilter.to)     : '',
            prbFilter.status ? 'Status: ' + prbFilter.status   : '',
            prbFilter.search ? 'Search: ' + prbFilter.search   : ''
          ].filter(Boolean).join(' · ');

          // Open the window eagerly so popup blockers see a user
          // gesture, then fill once all the RPCs resolve.
          var w = window.open('', '_blank', 'width=1000,height=760');
          if (!w) return;
          w.document.open();
          w.document.write(
            '<!doctype html><html><head><meta charset="utf-8"><title>Parish Reports</title>' +
            '<style>' +
              'body{font:13px/1.5 system-ui,sans-serif;color:#0f172a;padding:24px;}' +
              'h1{font:700 24px/1.2 system-ui;margin:0 0 4px;}' +
              'h2{font:700 15px/1.2 system-ui;margin:24px 0 8px;color:#1d4ed8;border-bottom:2px solid #dbeafe;padding-bottom:6px;}' +
              '.meta{color:#475569;margin-bottom:20px;font-size:12px;}' +
              '.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}' +
              '.stat{border:1px solid #cbd5e1;border-radius:10px;padding:10px 12px;}' +
              '.stat span{display:block;font:700 9px/1 system-ui;letter-spacing:.1em;text-transform:uppercase;color:#64748b;margin-bottom:6px;}' +
              '.stat strong{display:block;font:800 22px/1 system-ui;color:#0f172a;}' +
              'table{width:100%;border-collapse:collapse;margin-top:4px;font-size:12px;}' +
              'th,td{text-align:left;padding:6px 10px;border-bottom:1px solid #e2e8f0;vertical-align:top;}' +
              'th{background:#f1f5f9;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#475569;}' +
              '.empty{padding:10px 12px;color:#94a3b8;font-style:italic;}' +
              '.section-count{float:right;font:600 11px/1 system-ui;color:#64748b;letter-spacing:.06em;text-transform:uppercase;}' +
              '@media print { body{padding:0;} h2{break-after:avoid;} table{page-break-inside:auto;} tr{page-break-inside:avoid;} }' +
            '</style></head><body>' +
              '<h1>Parish Reports</h1>' +
              '<div class="meta">' + escapeHtml(parishName) +
                (filterLine ? ' — ' + escapeHtml(filterLine) : '') +
                ' · Generated ' + fmtDate(new Date().toISOString()) + '</div>' +
              '<div class="grid">' +
                summaryItems.map(function (i) {
                  return '<div class="stat"><span>' + escapeHtml(i.label) + '</span><strong>' + escapeHtml(i.value) + '</strong></div>';
                }).join('') +
              '</div>' +
              '<div id="prb-sections"><p class="empty">Loading data…</p></div>' +
            '</body></html>'
          );
          w.document.close();

          // Metrics to print data tables for (in order).
          var metricsToPrint = ["bookings", "pending", "events", "announcements", "archive", "members", "chapels", "live"];

          var promises = metricsToPrint.map(function (kind) {
            var meta = METRIC[kind];
            if (!meta) return Promise.resolve({ kind: kind, rows: [] });
            return rpc("parish_report_rows", {
              p_parish_id: pid,
              p_metric:    kind,
              p_from:      prbFilter.from || null,
              p_to:        prbFilter.to   || null,
              p_status:    (kind === "bookings" || kind === "pending" || kind === "archive") ? (prbFilter.status || null) : null,
              p_search:    prbFilter.search || null,
              p_limit:     1000
            }).then(function (rows) {
              return { kind: kind, rows: Array.isArray(rows) ? rows : [], meta: meta };
            }).catch(function () {
              return { kind: kind, rows: [], meta: meta };
            });
          });

          Promise.all(promises).then(function (results) {
            var host = w.document.getElementById("prb-sections");
            if (!host) return;
            var html = results.map(function (r) {
              if (!r.meta) return '';
              var head = '<tr>' + r.meta.cols.map(function (c) { return '<th>' + escapeHtml(c.head) + '</th>'; }).join('') + '</tr>';
              var body = (r.rows || []).map(function (row) {
                return '<tr>' + r.meta.cols.map(function (c) {
                  var v = row[c.key];
                  if (c.fmt === 'date') return '<td>' + fmtDate(v) + '</td>';
                  // Strip html tags from any server-returned text (keep it a clean print).
                  return '<td>' + escapeHtml(v == null ? '' : String(v).replace(/<[^>]+>/g, '')) + '</td>';
                }).join('') + '</tr>';
              }).join('');
              return '<h2>' + escapeHtml(r.meta.label) +
                       '<span class="section-count">' + (r.rows.length) + ' record' + (r.rows.length === 1 ? '' : 's') + '</span>' +
                     '</h2>' +
                     (r.rows.length
                        ? '<table><thead>' + head + '</thead><tbody>' + body + '</tbody></table>'
                        : '<p class="empty">No records.</p>');
            }).join('');
            host.innerHTML = html;

            w.focus();
            setTimeout(function () { try { w.print(); } catch (e) {} }, 500);
          });
        }

        function setValue(card, kind, value) {
          var el = card.querySelector('[data-reports-value="' + kind + '"]');
          if (!el) return;
          var txt = String(value == null ? 0 : value);
          if (el.textContent !== txt) el.textContent = txt;
        }

        function applyStats(card, stats) {
          if (!card || !stats) return;
          setValue(card, "bookings",      stats.month_bookings);
          setValue(card, "pending",       stats.pending_bookings);
          setValue(card, "members",       stats.members);
          setValue(card, "events",        stats.events);
          setValue(card, "announcements", stats.announcements);
          setValue(card, "archive",       stats.archive_records);
          setValue(card, "chapels",       stats.chapels);
          setValue(card, "live",          stats.live_streams);
        }

        var lastRun = 0;
        function tick() {
          var card = findReportsCard();
          if (!card) return;

          ensureBento(card);

          var pid = parishIdFromSession();
          if (!pid) return;

          var now = Date.now();
          if (now - lastRun < 2500) return;
          lastRun = now;

          // Core stats (month bookings etc) from parish_reports_by_id.
          rpc("parish_reports_by_id", { p_parish_id: pid })
            .then(function (data) {
              var row = Array.isArray(data) ? data[0] : data;
              if (!row) return;
              applyStats(card, row);
            })
            .catch(function () { /* keep previous values */ });

          // When the user narrows by filter, override the "bookings"
          // and "pending" tiles with the filtered counts so the numbers
          // match the modal.
          if (prbFilter.from || prbFilter.to || prbFilter.status || prbFilter.search) {
            rpc("parish_report_rows", {
              p_parish_id: pid, p_metric: "bookings",
              p_from: prbFilter.from || null, p_to: prbFilter.to || null,
              p_status: prbFilter.status || null, p_search: prbFilter.search || null,
              p_limit: 1000
            }).then(function (rows) {
              if (!Array.isArray(rows)) return;
              setValue(card, "bookings", rows.length);
              var pending = rows.filter(function (r) {
                var s = (r.status || '').toLowerCase();
                return /pending|review|correction/.test(s);
              }).length;
              setValue(card, "pending", pending);
            }).catch(function () {});
          }
        }

        function start() {
          setTimeout(tick, 600);
          setInterval(tick, 4000);
          window.addEventListener("hashchange", function () {
            // Leaving the Reports view -> drop any full-screen lock.
            setTimeout(function () {
              if (!findReportsCard()) {
                document.body.classList.remove("prb-fs-active");
              }
              tick();
            }, 300);
          });
          document.addEventListener("keydown", function (e) {
            if (!findReportsCard()) return;
            // Don't trigger while typing in the filter inputs.
            var tag = (e.target && e.target.tagName || '').toLowerCase();
            if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
            if (e.key === 'Escape') {
              toggleFullscreen(false);
            } else if (e.key === 'f' || e.key === 'F') {
              toggleFullscreen();
            }
          });
          var obs = new MutationObserver(function () { tick(); });
          obs.observe(document.body, { childList: true, subtree: true });
        }

        if (document.readyState === "complete" || document.readyState === "interactive") {
          setTimeout(start, 500);
        } else {
          document.addEventListener("DOMContentLoaded", function () { setTimeout(start, 500); });
        }
      })();
    </script>

    <!-- ================================================================
         Archive records: force-scope by parish_id.
         The parish dashboard occasionally saved archive rows without a
         parish_id (auth context missing on synthetic sessions). This
         script replaces the fetch path used by the archive list so it
         always calls `archive_records_for_parish(p_parish_id)` with the
         logged-in parish's id, and intercepts the save path to call
         `save_archive_record(p_parish_id, ...)` so the new rows land
         with the right parish_id every time.
         ================================================================ -->
    <script>
      (function () {
        var SESSION_KEY = "diocese-dashboard-db-session";
        var SUPABASE_URL = "https://lnipoknkbjcxwnggzrnm.supabase.co";
        var SUPABASE_KEY = "sb_publishable_865CAmJ0g9wUj9dlCo6phQ_l5biuRKK";

        function getSession() {
          try {
            var raw = window.sessionStorage.getItem(SESSION_KEY);
            if (raw) return JSON.parse(raw);
          } catch (e) {}
          try {
            var raw2 = window.localStorage.getItem(SESSION_KEY);
            if (raw2) return JSON.parse(raw2);
          } catch (e) {}
          return null;
        }

        function parishIdFromSession() {
          var s = getSession();
          if (!s) return null;
          return s.parishId || s.parish_id || (s.user && (s.user.parish_id || s.user.parishId)) || null;
        }

        function rpc(fn, body) {
          var s = getSession();
          var tok = (s && s.accessToken) || SUPABASE_KEY;
          return fetch(SUPABASE_URL + "/rest/v1/rpc/" + fn, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json",
              "apikey": SUPABASE_KEY,
              "Authorization": "Bearer " + tok
            },
            body: JSON.stringify(body || {})
          }).then(function (r) {
            return r.text().then(function (t) {
              var data = null;
              try { data = t ? JSON.parse(t) : null; } catch (e) { data = { message: t }; }
              if (!r.ok) {
                var msg = (data && (data.message || data.hint || data.error_description)) || ("HTTP " + r.status);
                var err = new Error(msg); err.status = r.status; err.payload = data; throw err;
              }
              return data;
            });
          });
        }

        // Intercept window.fetch so any PostgREST call to
        //   /rest/v1/diocese_archive_records?select=...
        // gets rerouted through archive_records_for_parish RPC scoped
        // to this parish's id. Also catches POST inserts.
        var origFetch = window.fetch.bind(window);
        window.fetch = function (input, init) {
          try {
            var url = typeof input === "string" ? input : (input && input.url) || "";
            var method = (init && init.method) || (input && input.method) || "GET";
            method = method.toUpperCase();

            if (url.indexOf("/rest/v1/diocese_archive_records") !== -1) {
              var parishId = parishIdFromSession();

              // --- GET/SELECT -------------------------------------------
              if (method === "GET" && parishId) {
                return rpc("archive_records_for_parish", {
                  p_parish_id: parishId,
                  p_record_type: null,
                  p_from_date: null,
                  p_to_date: null,
                  p_limit: 500,
                  p_offset: 0
                }).then(function (rows) {
                  var body = JSON.stringify(Array.isArray(rows) ? rows : []);
                  return new Response(body, {
                    status: 200,
                    headers: {
                      "Content-Type": "application/json",
                      "Content-Range": "0-" + Math.max(0, (rows || []).length - 1) + "/" + (rows || []).length
                    }
                  });
                }).catch(function () {
                  // Fall back to the original request if the RPC isn't
                  // installed yet; don't break the page.
                  return origFetch(input, init);
                });
              }

              // --- POST/INSERT ------------------------------------------
              if (method === "POST" && parishId && init && init.body) {
                try {
                  var raw = typeof init.body === "string" ? init.body : null;
                  if (raw) {
                    var payload = JSON.parse(raw);
                    var rows = Array.isArray(payload) ? payload : [payload];
                    var savePromises = rows.map(function (row) {
                      return rpc("save_archive_record", {
                        p_parish_id: parishId,
                        p_record_type: row.record_type || "Baptism",
                        p_first_name: row.first_name || "",
                        p_middle_name: row.middle_name || null,
                        p_last_name: row.last_name || "",
                        p_mother_name: row.mother_name || null,
                        p_mother_last_name: row.mother_last_name || null,
                        p_father_name: row.father_name || null,
                        p_father_last_name: row.father_last_name || null,
                        p_born_in: row.born_in || null,
                        p_born_on: row.born_on || null,
                        p_service_date: row.service_date || null,
                        p_rev_name: row.rev_name || null,
                        p_church: row.church || null,
                        p_register_no: row.register_no || null,
                        p_page_no: row.page_no || null,
                        p_line_no: row.line_no || null,
                        p_scanned_file_url: row.scanned_file_url || null,
                        p_scanned_file_name: row.scanned_file_name || null,
                        p_scanned_file_size: row.scanned_file_size || null,
                        p_scanned_file_type: row.scanned_file_type || null,
                        p_chapel_id: row.chapel_id || null
                      });
                    });
                    return Promise.all(savePromises).then(function (saved) {
                      var body = JSON.stringify(saved);
                      return new Response(body, {
                        status: 201,
                        headers: { "Content-Type": "application/json" }
                      });
                    }).catch(function () {
                      return origFetch(input, init);
                    });
                  }
                } catch (e) { /* JSON parse failed, fall through */ }
              }
            }
          } catch (e) { /* any error, fall through */ }
          return origFetch(input, init);
        };
      })();
    </script>

    <!-- ================================================================
         Senior-friendly text-size control.
         Floating A- / A / A+ pill (bottom-left) that adjusts the
         --sf-scale CSS variable. Persists choice in localStorage so
         returning users keep their preference.
         ================================================================ -->
    <script>
      (function () {
        var KEY = "diocese-sf-scale";
        var MIN = 1.0, MAX = 1.6, DEFAULT = 1.15, STEP = 0.1;

        function clamp(v) { return Math.max(MIN, Math.min(MAX, Math.round(v * 100) / 100)); }

        function load() {
          try {
            var raw = window.localStorage.getItem(KEY);
            if (!raw) return DEFAULT;
            var n = parseFloat(raw);
            return isNaN(n) ? DEFAULT : clamp(n);
          } catch (e) { return DEFAULT; }
        }
        function save(v) {
          try { window.localStorage.setItem(KEY, String(v)); } catch (e) {}
        }
        function apply(v) {
          document.documentElement.style.setProperty("--sf-scale", String(v));
          updateButtons(v);
        }
        function updateButtons(v) {
          var minus = document.getElementById("sf-toggle__minus");
          var reset = document.getElementById("sf-toggle__reset");
          var plus  = document.getElementById("sf-toggle__plus");
          if (!minus || !reset || !plus) return;
          minus.disabled = v <= MIN + 0.001;
          plus.disabled  = v >= MAX - 0.001;
          reset.setAttribute("aria-pressed", String(Math.abs(v - DEFAULT) < 0.01));
        }

        function render() {
          if (document.getElementById("sf-toggle")) return;
          var v = load();
          apply(v);

          var pill = document.createElement("div");
          pill.id = "sf-toggle";
          pill.setAttribute("role", "group");
          pill.setAttribute("aria-label", "Adjust text size");
          pill.innerHTML =
            '<span id="sf-toggle__label" aria-hidden="true">Text</span>' +
            '<button type="button" id="sf-toggle__minus" aria-label="Decrease text size" title="Decrease text size">A&minus;</button>' +
            '<button type="button" id="sf-toggle__reset" aria-label="Reset text size" title="Reset to comfortable default">A</button>' +
            '<button type="button" id="sf-toggle__plus"  aria-label="Increase text size" title="Increase text size">A+</button>';
          document.body.appendChild(pill);

          pill.querySelector("#sf-toggle__minus").addEventListener("click", function () {
            v = clamp(v - STEP); apply(v); save(v);
          });
          pill.querySelector("#sf-toggle__reset").addEventListener("click", function () {
            v = DEFAULT; apply(v); save(v);
          });
          pill.querySelector("#sf-toggle__plus").addEventListener("click", function () {
            v = clamp(v + STEP); apply(v); save(v);
          });
        }

        function ensure() {
          // Don't show the pill on the login splash -- the bypass pill
          // is there already and we don't want two floating buttons in
          // the same corner. The login hash is empty or "#login".
          var onLogin = !window.location.hash || /#login/i.test(window.location.hash);
          var pill = document.getElementById("sf-toggle");
          if (onLogin) { if (pill) pill.remove(); return; }
          if (!pill) render();
        }

        function start() {
          // Apply saved scale immediately even before the pill exists
          // so the first paint is already senior-friendly.
          apply(load());
          ensure();
          window.addEventListener("hashchange", ensure);
          setInterval(ensure, 2000);
        }

        if (document.readyState === "complete" || document.readyState === "interactive") {
          setTimeout(start, 300);
        } else {
          document.addEventListener("DOMContentLoaded", function () { setTimeout(start, 300); });
        }
      })();
    </script>

    <!-- ================================================================
         Global "Church" -> "Chapel" label rewriter.
         Covers sidebar nav buttons, topbar headings, breadcrumbs, badges
         and any other UI chrome that still says "Church". Runs on every
         DOM change so it also catches items rendered after navigation.
         ================================================================ -->
    <script>
      (function () {
        // Ordered list of word-level swaps. Longer phrases must come
        // first so "Parish Church" is handled before the generic
        // "Church" -> "Chapel" rule fires.
        var SWAPS = [
          [/\bParish Church\b/g,     "Parish Chapel"],
          [/\bparish church\b/g,     "parish chapel"],
          [/\bUser Church\b/g,       "User Chapel"],
          [/\bChurch Information\b/g,"Chapel Information"],
          [/\bChurch Hours\b/gi,     "Chapel Hours"],
          [/\bChurch Schedule\b/gi,  "Chapel Schedule"],
          [/\bChurch or parish\b/gi, "Chapel or parish"],
          [/\bthe Church\b/g,        "the Chapel"],
          [/\bChurches\b/g,          "Chapels"],
          [/\bchurches\b/g,          "chapels"],
          [/\bChurch\b/g,            "Chapel"],
          [/\bchurch\b/g,            "chapel"]
        ];

        // Only rewrite short UI-chrome nodes. Longer blocks (record
        // descriptions, certificate body text, user-entered data, etc.)
        // are left alone to avoid distorting meaningful content.
        var MAX_LEN = 160;

        // Skip text inside form inputs, our own chapel manager, records
        // lists and editable regions so we don't rename user data.
        function shouldSkip(node) {
          var el = node.parentElement;
          while (el) {
            var tag = el.tagName;
            if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || tag === "SCRIPT" || tag === "STYLE" || tag === "CODE" || tag === "PRE") return true;
            if (el.isContentEditable) return true;
            // Our injected Chapels manager / dialogs / certificate
            // search all rewrite their own text; leave them alone.
            if (el.classList && (
              el.classList.contains("pch-wrap") ||
              el.classList.contains("pch-dialog") ||
              el.classList.contains("pdm-widget") ||
              el.classList.contains("ucs-wrap") ||
              el.classList.contains("plh-wrap")
            )) return true;
            // Cells rendering archive records, bookings and certificate
            // body copy -- those are data-driven, don't rewrite.
            if (el.hasAttribute && (
              el.hasAttribute("data-archive-row") ||
              el.hasAttribute("data-booking-row") ||
              el.hasAttribute("data-certificate-body")
            )) return true;
            el = el.parentElement;
          }
          return false;
        }

        function rewriteText(t) {
          var out = t;
          for (var i = 0; i < SWAPS.length; i++) {
            out = out.replace(SWAPS[i][0], SWAPS[i][1]);
          }
          return out;
        }

        function scanRoot(root) {
          try {
            var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
              acceptNode: function (n) {
                if (!n.nodeValue) return NodeFilter.FILTER_REJECT;
                if (n.nodeValue.length > MAX_LEN) return NodeFilter.FILTER_REJECT;
                if (!/church/i.test(n.nodeValue)) return NodeFilter.FILTER_REJECT;
                if (shouldSkip(n)) return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT;
              }
            });
            var node;
            while ((node = walker.nextNode())) {
              var next = rewriteText(node.nodeValue);
              if (next !== node.nodeValue) node.nodeValue = next;
            }
          } catch (e) { /* noop */ }

          // Attribute-level swaps (aria-label, title, placeholder, alt).
          try {
            var els = root.querySelectorAll ? root.querySelectorAll("[aria-label], [title], [placeholder], [alt]") : [];
            Array.prototype.forEach.call(els, function (el) {
              ["aria-label", "title", "placeholder", "alt"].forEach(function (attr) {
                var v = el.getAttribute(attr);
                if (!v || v.length > MAX_LEN || !/church/i.test(v)) return;
                var next = rewriteText(v);
                if (next !== v) el.setAttribute(attr, next);
              });
            });
          } catch (e) { /* noop */ }
        }

        var pending = false;
        function schedule() {
          if (pending) return;
          pending = true;
          (window.requestAnimationFrame || setTimeout)(function () {
            pending = false;
            scanRoot(document.body);
          }, 16);
        }

        function start() {
          scanRoot(document.body);

            return r.text().then(function (t) {
              var data = null;
              try {
                data = t ? JSON.parse(t) : null;
              } catch (e) {}
              throw new Error((data && data.message) || t || "HTTP " + r.status);
            });
          });
        }

        /* Prefer fresh RPC name first — avoids a stuck PostgREST cache on delete_my_booking. */
        function rpcDeleteBooking(bookingId, onOk, onErr) {
          postRpc("umr_delete_own_booking", { p_booking_id: bookingId })
            .then(onOk)
            .catch(function () {
              return postRpc("delete_my_booking", { p_id: bookingId })
                .then(onOk)
                .catch(function () {
                  return restDeleteBooking(bookingId).then(onOk).catch(onErr);
                });
            });
        }

        function resolveBookingId(card, index) {
          var refEl = card.querySelector(".user-request-card__reference strong");
          var ref = refEl ? String(refEl.textContent || "").trim() : "";
          if (ref && window.__umrByRef && window.__umrByRef[ref]) {
            return window.__umrByRef[ref];
          }
          if (window.__umrLastBookings && window.__umrLastBookings[index] && window.__umrLastBookings[index].id) {
            return window.__umrLastBookings[index].id;
          }
          return null;
        }

        function enhanceCards() {
          if (!isMyRequestsRoute()) return;
          var list = document.querySelector(".user-request-booking-list");
          if (!list) return;
          var cards = list.querySelectorAll(".user-request-card");
          Array.prototype.forEach.call(cards, function (card, index) {
            if (card.querySelector(".umr-delete-wrap")) return;
            var id = resolveBookingId(card, index);
            if (!id) return;

            var wrap = document.createElement("div");
            wrap.className = "umr-delete-wrap";
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "umr-delete-btn";
            btn.textContent = "Delete request";
            btn.setAttribute("data-umr-booking-id", id);

            btn.addEventListener("click", function () {
              if (!window.confirm("Delete this request permanently? This cannot be undone.")) return;
              btn.disabled = true;
              btn.textContent = "Deleting…";
              rpcDeleteBooking(
                id,
                function () {
                  card.remove();
                  try {
                    if (window.__umrLastBookings) {
                      window.__umrLastBookings = window.__umrLastBookings.filter(function (r) {
                        return String(r.id) !== String(id);
                      });
                    }
                    if (window.__umrByRef) {
                      Object.keys(window.__umrByRef).forEach(function (k) {
                        if (String(window.__umrByRef[k]) === String(id)) delete window.__umrByRef[k];
                      });
                    }
                  } catch (e) {}
                  if (list && !list.querySelector(".user-request-card")) {
                    window.location.reload();
                  }
                },
                function (err) {
                  btn.disabled = false;
                  btn.textContent = "Delete request";
                  window.alert(err && err.message ? err.message : "Could not delete this request.");
                }
              );
            });

            wrap.appendChild(btn);
            card.appendChild(wrap);
          });
        }

        function tick() {
          if (!isMyRequestsRoute()) return;
          enhanceCards();
        }

        function start() {
          tick();
          window.addEventListener("hashchange", function () {
            setTimeout(tick, 400);
          });
          var obs = new MutationObserver(function () {
            tick();
          });
          obs.observe(document.body, { childList: true, subtree: true });
          setInterval(tick, 2000);
        }

        if (document.readyState === "complete" || document.readyState === "interactive") {
          setTimeout(start, 600);
        } else {
          document.addEventListener("DOMContentLoaded", function () {
            setTimeout(start, 600);
          });
        }
      })();
    </script>
  </body>
</html>
