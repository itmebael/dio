    <script>
      (function () {
        var SESSION_KEY = "diocese-dashboard-db-session";
        var THEME_KEY = "diocese-dashboard-theme";
        function getSession() {
          try {
            var raw = sessionStorage.getItem(SESSION_KEY);
            if (raw) return JSON.parse(raw);
          } catch (e) {}
          try {
            var raw2 = localStorage.getItem(SESSION_KEY);
            if (raw2) return JSON.parse(raw2);
          } catch (e) {}
          return null;
        }
        function sessionRole() {
          var s = getSession();
          if (!s) return "";
          var r = s.role;
          if (!r && s.user) {
            r = s.user.role ||
              (s.user.user_metadata && s.user.user_metadata.role) ||
              (s.user.app_metadata && s.user.app_metadata.role);
          }
          return String(r || "").toLowerCase();
        }
        function onLoginRoute() {
          var h = (location.hash || "").replace(/^#/, "").toLowerCase();
          return !h || h === "login";
        }
        function isUserHashRoute() {
          var h = (location.hash || "").replace(/^#/, "").toLowerCase();
          if (!h || h === "login") return false;
          return /^user-/.test(h) || h === "user-correction";
        }
        function isUserDashboard() {
          if (onLoginRoute()) return false;
          if (isUserHashRoute()) return true;
          var r = sessionRole();
          return r === "user" || r === "member" || r === "community";
        }
        function applyUserLightOnly() {
          if (!isUserDashboard()) {
            document.documentElement.removeAttribute("data-user-light-lock");
            return;
          }
          document.documentElement.setAttribute("data-user-light-lock", "1");
          try {
            localStorage.setItem(THEME_KEY, "light");
          } catch (e) {}
          document.documentElement.setAttribute("data-theme", "light");
        }
        var _setItem = Storage.prototype.setItem;
        Storage.prototype.setItem = function (key, val) {
          if (key === THEME_KEY && isUserDashboard()) {
            val = "light";
          }
          return _setItem.call(this, key, val);
        };
        var _getItem = Storage.prototype.getItem;
        Storage.prototype.getItem = function (key) {
          if (key === THEME_KEY && isUserDashboard()) {
            return "light";
          }
          return _getItem.call(this, key);
        };
        applyUserLightOnly();

        window.addEventListener("storage", function (e) {
          if (e.key === SESSION_KEY) applyUserLightOnly();
        });

            }
          });
          mo.observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });
        } catch (e) {}
      })();

        color: #0f172a !important;
      }
      html[data-theme="dark"] .notification-menu [class*="subtitle"],
      html[data-theme="dark"] .notification-menu [class*="meta"],
      html[data-theme="dark"] .notification-menu [class*="time"],
      html[data-theme="dark"] .notification-menu small,
      html[data-theme="dark"] .notification-item__meta,
      html[data-theme="dark"] .notification-item__time,
      html[data-theme="dark"] .notification-empty small {
        color: #475569 !important;
      }

      /* Headings inside notifications: extra bold, pure dark. */
      html[data-theme="dark"] .notification-menu h1,
      html[data-theme="dark"] .notification-menu h2,
      html[data-theme="dark"] .notification-menu h3,
      html[data-theme="dark"] .notification-menu h4,
      html[data-theme="dark"] .notification-menu [class*="title"],
      html[data-theme="dark"] .notification-menu strong,
      html[data-theme="dark"] .notification-item [class*="title"],
      html[data-theme="dark"] .notification-item strong {
        color: #0f172a !important;
      }

      /* Ensure the notification cards keep a light background so the
         dark text remains legible even if a parent dark style tried
         to flip them. */
      html[data-theme="dark"] .notification-menu,
      html[data-theme="dark"] .notification-item,
      html[data-theme="dark"] [class*="notification-toast"],
      html[data-theme="dark"] [class*="activity-pop"],
      html[data-theme="dark"] [class*="realtime-toast"] {
        background: #ffffff !important;
        border-color: rgba(15,23,42,.1) !important;
      }

      /* =========================================================
         Parish Reports: bento grid layout.
         The dashboard's default grid shows 5 equal-weight tiles.
         This bento layout promotes the two most important numbers
         (month bookings + pending bookings) into feature tiles,
         keeps the rest as supporting tiles, and gives every card
         a modern icon + gradient + readable stat.
         ========================================================= */
      /* Filter / action bar. */
      .prb-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin: 4px 0 10px;
        padding: 10px 12px;
        border-radius: 14px;
        background: rgba(241,245,249,.7);
        border: 1px solid rgba(15,23,42,.08);
      }
      .prb-toolbar label {
        font: 600 11px/1 system-ui;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: #475569;
      }
      .prb-toolbar input,
      .prb-toolbar select {
        font: 500 13px/1 system-ui;
        padding: 7px 10px;
        border-radius: 9px;
        border: 1px solid rgba(15,23,42,.14);
        background: #fff;
        color: #0f172a;
        min-height: 34px;
      }
      .prb-toolbar input[type="search"] { min-width: 180px; }
      .prb-toolbar .prb-spacer { flex: 1; }
      .prb-btn {
        font: 600 12px/1 system-ui;
        padding: 8px 14px;
        border-radius: 9px;
        border: 1px solid rgba(37,99,235,.25);
        background: #fff;
        color: #1d4ed8;
        cursor: pointer;
        transition: all .15s ease;
      }
      .prb-btn:hover { background: #eff6ff; }
      .prb-btn--primary {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #fff;
        border-color: transparent;
        box-shadow: 0 8px 16px -8px rgba(37,99,235,.5);
      }
      .prb-btn--primary:hover { filter: brightness(1.05); background: linear-gradient(135deg, #2563eb, #1d4ed8); }
      .prb-btn--ghost { background: transparent; color: #475569; border-color: rgba(15,23,42,.14); }

      .parish-reports-bento {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        grid-auto-rows: minmax(92px, auto);
        gap: 10px;
        margin-top: 4px;
      }
      .prb-tile {
        position: relative;
        border-radius: 14px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        color: #0f172a;
        background: #fff;
        border: 1px solid rgba(15,23,42,.08);
        box-shadow: 0 12px 24px -20px rgba(15,23,42,.25);
        overflow: hidden;
        cursor: pointer;
        transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
      }
      .prb-tile:hover {
        transform: translateY(-1px);
        border-color: rgba(37,99,235,.3);
        box-shadow: 0 16px 32px -20px rgba(37,99,235,.35);
      }
      .prb-tile:focus-visible { outline: 2px solid #2563eb; outline-offset: 2px; }
      .prb-tile__icon {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 30px;
        height: 30px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        background: linear-gradient(135deg, #60a5fa, #2563eb);
        box-shadow: 0 6px 14px -8px rgba(37,99,235,.55);
      }
      .prb-tile__icon svg { width: 16px; height: 16px; }
      .prb-tile__label {
        font: 700 10px/1 system-ui;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: #64748b;
        padding-right: 36px;
      }
      .prb-tile__value {
        font: 800 28px/1 "Manrope", system-ui, sans-serif;
        letter-spacing: -.02em;
        color: #0f172a;
        margin-top: 2px;
      }
      .prb-tile__note {
        font: 500 11px/1.3 system-ui;
        color: #64748b;
        margin-top: auto;
      }
      .prb-tile__view {
        position: absolute;
        bottom: 8px;
        right: 10px;
        font: 600 10px/1 system-ui;
        color: #2563eb;
        letter-spacing: .04em;
        opacity: 0;
        transition: opacity .15s ease;
      }
      .prb-tile:hover .prb-tile__view { opacity: 1; }

      .prb-tile--feature   { grid-column: span 3; grid-row: span 2; padding: 16px 18px; background: linear-gradient(135deg, #dbeafe 0%, #ffffff 65%, #e0f2fe 100%); border-color: rgba(37,99,235,.22); }
      .prb-tile--large     { grid-column: span 3; grid-row: span 1; }
      .prb-tile--medium    { grid-column: span 2; grid-row: span 1; }
      .prb-tile--small     { grid-column: span 2; grid-row: span 1; }
      .prb-tile--feature .prb-tile__value { font-size: 44px; }
      .prb-tile--feature .prb-tile__icon  { width: 36px; height: 36px; border-radius: 11px; background: linear-gradient(135deg, #2563eb, #1d4ed8); }
      .prb-tile--feature .prb-tile__icon svg { width: 19px; height: 19px; }

      /* Data modal */
      .prb-modal {
        position: fixed; inset: 0; z-index: 9000;
        background: rgba(15,23,42,.55);
        display: flex; align-items: center; justify-content: center;
        padding: 16px;
      }
      .prb-modal__card {
        width: min(920px, 100%);
        max-height: 86vh;
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 30px 60px -20px rgba(15,23,42,.5);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .prb-modal__head {
        display: flex; align-items: center; gap: 12px;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(15,23,42,.08);
      }
      .prb-modal__head h3 {
        margin: 0;
        font: 700 18px/1.1 "Manrope", system-ui, sans-serif;
        color: #0f172a;
      }
      .prb-modal__head .prb-spacer { flex: 1; }
      .prb-modal__body { padding: 16px 20px; overflow: auto; }
      .prb-modal__foot {
        display: flex; gap: 8px; align-items: center;
        padding: 12px 20px;
        border-top: 1px solid rgba(15,23,42,.08);
        background: #f8fafc;
      }
      .prb-modal__close {
        width: 32px; height: 32px; border-radius: 8px;
        border: 1px solid rgba(15,23,42,.14); background: #fff;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        color: #475569; font-size: 18px;
      }
      .prb-table { width: 100%; border-collapse: collapse; }
      .prb-table th, .prb-table td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(15,23,42,.06);
        font: 500 13px/1.4 system-ui;
        color: #0f172a;
      }
      .prb-table th {
        font-weight: 700;
        font-size: 11px;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: #64748b;
        background: #f8fafc;
        position: sticky; top: 0;
      }
      .prb-table tr:hover td { background: #f8fafc; }
      .prb-empty {
        text-align: center; padding: 30px 12px;
        color: #64748b; font: 500 13px/1.4 system-ui;
      }
      .prb-chip {
        display: inline-block; padding: 2px 8px;
        border-radius: 999px; font: 700 10px/1.4 system-ui;
        background: rgba(37,99,235,.08); color: #1d4ed8;
        letter-spacing: .04em; text-transform: uppercase;
      }
      .prb-chip--pending   { background: rgba(245,158,11,.15); color: #b45309; }
      .prb-chip--completed { background: rgba(16,185,129,.15); color: #047857; }
      .prb-chip--cancelled { background: rgba(239,68,68,.12);  color: #b91c1c; }

      .prb-tile[data-kind="pending"]       .prb-tile__icon { background: linear-gradient(135deg, #f59e0b, #b45309); }
      .prb-tile[data-kind="members"]       .prb-tile__icon { background: linear-gradient(135deg, #10b981, #047857); }
      .prb-tile[data-kind="events"]        .prb-tile__icon { background: linear-gradient(135deg, #ec4899, #be185d); }
      .prb-tile[data-kind="announcements"] .prb-tile__icon { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }
      .prb-tile[data-kind="archive"]       .prb-tile__icon { background: linear-gradient(135deg, #f97316, #c2410c); }
      .prb-tile[data-kind="chapels"]       .prb-tile__icon { background: linear-gradient(135deg, #0ea5e9, #0369a1); }
      .prb-tile[data-kind="live"]          .prb-tile__icon { background: linear-gradient(135deg, #ef4444, #b91c1c); }

      @media (max-width: 900px) {
        .parish-reports-bento { grid-template-columns: repeat(4, 1fr); }
        .prb-tile--feature   { grid-column: span 4; grid-row: span 1; }
        .prb-tile--large     { grid-column: span 4; }
        .prb-tile--medium    { grid-column: span 2; }
        .prb-tile--small     { grid-column: span 2; }
      }
      @media (max-width: 560px) {
        .parish-reports-bento { grid-template-columns: repeat(2, 1fr); }
        .prb-tile--feature, .prb-tile--large, .prb-tile--medium, .prb-tile--small { grid-column: span 2; grid-row: auto; }
      }

      /* ---------- Dark mode: dark surfaces + white text ---------- */
      html[data-theme="dark"] .prb-toolbar {
        background: rgba(15,23,42,.65);
        border-color: rgba(148,163,184,.18);
      }
      html[data-theme="dark"] .prb-toolbar label { color: #cbd5e1 !important; }
      html[data-theme="dark"] .prb-toolbar input,
      html[data-theme="dark"] .prb-toolbar select {
        background: #0f172a;
        color: #f8fafc;
        border-color: rgba(148,163,184,.25);
      }
      html[data-theme="dark"] .prb-toolbar input::placeholder { color: #94a3b8; }
      html[data-theme="dark"] .prb-toolbar input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1) brightness(1.2);
      }
      html[data-theme="dark"] .prb-btn {
        background: #0f172a;
        color: #dbeafe;
        border-color: rgba(96,165,250,.4);
      }
      html[data-theme="dark"] .prb-btn:hover { background: #1e293b; }
      html[data-theme="dark"] .prb-btn--ghost {
        background: transparent;
        color: #cbd5e1;
        border-color: rgba(148,163,184,.25);
      }
      html[data-theme="dark"] .prb-btn--primary {
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: #fff;
        border-color: transparent;
      }

      html[data-theme="dark"] .prb-tile {
        background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        border-color: rgba(148,163,184,.18);
        box-shadow: 0 12px 24px -20px rgba(0,0,0,.8);
      }
      html[data-theme="dark"] .prb-tile:hover {
        border-color: rgba(96,165,250,.45);
        box-shadow: 0 16px 32px -16px rgba(37,99,235,.55);
      }
      html[data-theme="dark"] .prb-tile--feature {
        background: linear-gradient(135deg, #1e3a8a 0%, #1e293b 55%, #082f49 100%);
        border-color: rgba(96,165,250,.35);
      }
      html[data-theme="dark"] .prb-tile__label { color: #94a3b8 !important; }
      html[data-theme="dark"] .prb-tile__value { color: #f8fafc !important; }
      html[data-theme="dark"] .prb-tile__note  { color: #cbd5e1 !important; }
      html[data-theme="dark"] .prb-tile__view  { color: #93c5fd !important; }

      /* Modal */
      html[data-theme="dark"] .prb-modal__card {
        background: #0f172a;
        color: #f8fafc;
        box-shadow: 0 30px 60px -20px rgba(0,0,0,.85);
      }
      html[data-theme="dark"] .prb-modal__head,
      html[data-theme="dark"] .prb-modal__foot {
        border-color: rgba(148,163,184,.18);
      }
      html[data-theme="dark"] .prb-modal__foot { background: #0b1220; }
      html[data-theme="dark"] .prb-modal__head h3 { color: #f8fafc !important; }
      html[data-theme="dark"] .prb-modal__close {
        background: #1e293b;
        color: #e2e8f0;
        border-color: rgba(148,163,184,.25);
      }
      html[data-theme="dark"] .prb-modal__foot span[data-prb-count] { color: #cbd5e1 !important; }

      html[data-theme="dark"] .prb-table th,
      html[data-theme="dark"] .prb-table td {
        color: #f1f5f9;
        border-color: rgba(148,163,184,.12);
      }
      html[data-theme="dark"] .prb-table th {
        background: #1e293b;
        color: #cbd5e1;
      }
      html[data-theme="dark"] .prb-table tr:hover td { background: rgba(30,41,59,.6); }
      html[data-theme="dark"] .prb-empty { color: #cbd5e1; }

      /* Status chips: boost contrast on dark */
      html[data-theme="dark"] .prb-chip            { background: rgba(96,165,250,.2);  color: #bfdbfe; }
      html[data-theme="dark"] .prb-chip--pending   { background: rgba(245,158,11,.25); color: #fde68a; }
      html[data-theme="dark"] .prb-chip--completed { background: rgba(16,185,129,.25); color: #bbf7d0; }
      html[data-theme="dark"] .prb-chip--cancelled { background: rgba(239,68,68,.25);  color: #fecaca; }

      /* =========================================================
         Full-screen Parish Reports.
         When the toolbar's "Full screen" button is toggled we set
         data-prb-fullscreen="1" on the card so it covers the whole
         viewport, with a scrollable body and a wider bento grid.
         ========================================================= */
      body.prb-fs-active { overflow: hidden; }
      .glass-card[data-prb-fullscreen="1"] {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        max-width: none !important;
        height: 100vh !important;
        max-height: 100vh !important;
        margin: 0 !important;
        border-radius: 0 !important;
        z-index: 9500 !important;
        display: flex !important;
        flex-direction: column !important;
        background: #f8fafc;
        box-shadow: 0 40px 80px rgba(15,23,42,.5);
      }
      html[data-theme="dark"] .glass-card[data-prb-fullscreen="1"] {
        background: #0b1220;
      }
      .glass-card[data-prb-fullscreen="1"] .glass-card__header {
        padding: 18px 28px !important;
        border-bottom: 1px solid rgba(15,23,42,.08);
      }
      .glass-card[data-prb-fullscreen="1"] .glass-card__body {
        flex: 1 1 auto;
        overflow: auto;
        padding: 20px 28px 28px !important;
      }
      .glass-card[data-prb-fullscreen="1"] .parish-reports-bento {
        grid-template-columns: repeat(8, 1fr);
        grid-auto-rows: minmax(120px, auto);
        gap: 14px;
      }
      .glass-card[data-prb-fullscreen="1"] .prb-tile--feature { grid-column: span 4; grid-row: span 2; }
      .glass-card[data-prb-fullscreen="1"] .prb-tile--large   { grid-column: span 4; }
      .glass-card[data-prb-fullscreen="1"] .prb-tile--medium  { grid-column: span 3; }
      .glass-card[data-prb-fullscreen="1"] .prb-tile--small   { grid-column: span 2; }
      .glass-card[data-prb-fullscreen="1"] .prb-tile--feature .prb-tile__value { font-size: 56px; }
      .glass-card[data-prb-fullscreen="1"] .prb-tile__value { font-size: 34px; }
      .glass-card[data-prb-fullscreen="1"] .prb-toolbar { margin: 0 0 14px; padding: 14px 18px; }

      @media (max-width: 1100px) {
        .glass-card[data-prb-fullscreen="1"] .parish-reports-bento {
          grid-template-columns: repeat(6, 1fr);
        }
        .glass-card[data-prb-fullscreen="1"] .prb-tile--feature { grid-column: span 3; }
        .glass-card[data-prb-fullscreen="1"] .prb-tile--large   { grid-column: span 3; }
        .glass-card[data-prb-fullscreen="1"] .prb-tile--medium  { grid-column: span 2; }
        .glass-card[data-prb-fullscreen="1"] .prb-tile--small   { grid-column: span 2; }
      }

      /* When our bento is mounted inside the Parish Reports card,
         hide the original React-rendered mini-stat grid / empty
         states so we don't need to remove them from the DOM (which
         would crash React's reconciler during unmount). */
      .glass-card[data-prb-mounted="1"] .mini-stat-grid,
      .glass-card[data-prb-mounted="1"] .empty-state,
      .glass-card[data-prb-mounted="1"] .empty-card,
      .glass-card[data-prb-mounted="1"] [class*="empty"]:not(.parish-reports-bento):not(.parish-reports-bento *) {
        display: none !important;
      }

      /* =========================================================
         Parish Reports card: always take the full content width.
         The dashboard puts this card in a half-width column next
         to a hero image; stretch it so the bento can breathe.
         ========================================================= */
      .glass-card[data-prb-mounted="1"] {
        grid-column: 1 / -1 !important;
        width: 100% !important;
        max-width: none !important;
      }
      /* If the card's parent is a flex/grid with siblings (e.g. the
         parish hero photo), let this card claim the whole row. */
      .glass-card[data-prb-mounted="1"] {
        flex: 1 1 100% !important;
      }
      /* Expand the bento to more columns when the card is wide. */
      .glass-card[data-prb-mounted="1"] .parish-reports-bento {
        grid-template-columns: repeat(8, 1fr);
        grid-auto-rows: minmax(116px, auto);
        gap: 12px;
      }
      .glass-card[data-prb-mounted="1"] .prb-tile--feature { grid-column: span 4; grid-row: span 2; }
      .glass-card[data-prb-mounted="1"] .prb-tile--large   { grid-column: span 4; }
      .glass-card[data-prb-mounted="1"] .prb-tile--medium  { grid-column: span 3; }
      .glass-card[data-prb-mounted="1"] .prb-tile--small   { grid-column: span 2; }
      .glass-card[data-prb-mounted="1"] .prb-tile--feature .prb-tile__value { font-size: 52px; }
      .glass-card[data-prb-mounted="1"] .prb-tile__value { font-size: 32px; }
      .glass-card[data-prb-mounted="1"] .prb-tile { padding: 14px 16px; }

      @media (max-width: 1200px) {
        .glass-card[data-prb-mounted="1"] .parish-reports-bento {
          grid-template-columns: repeat(6, 1fr);
        }
        .glass-card[data-prb-mounted="1"] .prb-tile--feature { grid-column: span 3; }
        .glass-card[data-prb-mounted="1"] .prb-tile--large   { grid-column: span 3; }
        .glass-card[data-prb-mounted="1"] .prb-tile--medium  { grid-column: span 2; }
        .glass-card[data-prb-mounted="1"] .prb-tile--small   { grid-column: span 2; }
      }
      @media (max-width: 800px) {
        .glass-card[data-prb-mounted="1"] .parish-reports-bento {
          grid-template-columns: repeat(4, 1fr);
        }
        .glass-card[data-prb-mounted="1"] .prb-tile--feature { grid-column: span 4; grid-row: span 1; }
        .glass-card[data-prb-mounted="1"] .prb-tile--large   { grid-column: span 4; }
        .glass-card[data-prb-mounted="1"] .prb-tile--medium  { grid-column: span 2; }
        .glass-card[data-prb-mounted="1"] .prb-tile--small   { grid-column: span 2; }
      }

      /* =========================================================
         Sidebar button pressed / active state.
         Applies to every dashboard (user, parish, diocese) since
         they all share `.nav-item` / `.nav-item.is-active`.
         Clicked buttons flash bright so the user sees exactly which
         section is selected, and stay visibly "lit" afterwards.
         ========================================================= */
      .nav-item {
        transition:
          transform .15s ease,
          background-color .2s ease,
          box-shadow .2s ease,
          color .15s ease !important;
        -webkit-tap-highlight-color: rgba(91,199,255,.28);
      }

      /* Momentary press effect for any sidebar button click. */
      .nav-item:active {
        transform: translateX(4px) scale(.99) !important;
        background: linear-gradient(135deg, #ffffff, #dbeafe) !important;
        color: #0f172a !important;
        box-shadow:
          inset 0 1px 0 #ffffff,
          0 6px 18px -8px rgba(37,99,235,.45),
          0 0 0 2px rgba(59,130,246,.35) !important;
      }

      /* Sustained active / selected state -- clearly lighter than
         any neighboring sidebar button, with dark text so the label
         pops. Works in both light and dark mode. */
      .nav-item.is-active,
      .nav-item[aria-current="page"],
      .nav-item.active {
        background: linear-gradient(135deg, #ffffff, #dbeafe) !important;
        color: #0f172a !important;
        border-color: rgba(37,99,235,.45) !important;
        box-shadow:
          inset 0 1px 0 #ffffff,
          0 10px 24px -12px rgba(37,99,235,.5),
          0 0 0 2px rgba(59,130,246,.25) !important;
        transform: translateX(4px) !important;
      }
      .nav-item.is-active .nav-item__icon,
      .nav-item[aria-current="page"] .nav-item__icon,
      .nav-item.active .nav-item__icon {
        color: #1d4ed8 !important;
        background: rgba(59,130,246,.15) !important;
      }
      .nav-item.is-active svg,
      .nav-item[aria-current="page"] svg,
      .nav-item.active svg {
        color: #1d4ed8 !important;
      }

      /* Dark-mode: keep the lit-up look readable -- bright card on
         dark sidebar background, same dark text. */
      html[data-theme="dark"] .nav-item.is-active,

    <script>
      (function () {
        var KEY = "diocese-dashboard-db-session";
        var URL = "https://lnipoknkbjcxwnggzrnm.supabase.co";
        var PUB = "sb_publishable_865CAmJ0g9wUj9dlCo6phQ_l5biuRKK";

        function getSession() {
          try {
            var raw = window.sessionStorage.getItem(KEY);
            if (!raw) return null;
            var s = JSON.parse(raw);
            return s && typeof s === "object" ? s : null;
          } catch (e) { return null; }
        }

        function rpc(fn, body) {
          var s = getSession();
          var tok = (s && s.accessToken) || PUB;
          return fetch(URL + "/rest/v1/rpc/" + fn, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json",
              "apikey": PUB,
              "Authorization": "Bearer " + tok
            },
            body: JSON.stringify(body || {})
          }).then(function (r) {
            return r.text().then(function (t) {
              var data = null;
              try { data = t ? JSON.parse(t) : null; } catch (e) { data = { message: t }; }
              if (!r.ok) {
                var msg = (data && (data.message || data.hint || data.error_description)) || ("HTTP " + r.status);
                var err = new Error(msg); err.status = r.status; err.payload = data;
                throw err;
              }
              return data;
            });
          });
        }

        function fmtTime(iso) {
          if (!iso) return "";
          try {
            var d = new Date(iso);
            var today = new Date(); today.setHours(0,0,0,0);
            if (d >= today) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
            return d.toLocaleDateString([], { month: "short", day: "numeric" });
          } catch (e) { return ""; }
        }

        function initials(s) {
          return String(s || "?").split(/\s+/).filter(Boolean).map(function (p) { return p.charAt(0); }).slice(0, 2).join("").toUpperCase() || "?";
        }

        var state = {
          open: false,
          threads: [],
          activeParishId: null,
          activeParishName: "",
          messages: [],
          loadingThreads: false,
          loadingMessages: false,
          sending: false,
          error: null,
          unreadTotal: 0,
          role: ""
        };
        var pollThreadsTimer = null;
        var pollMessagesTimer = null;
        var lastMsgCount = 0;

        function role() {
          var s = getSession();
          var r = (s && s.role) || "";
          if (r === "parish" || r === "diocese") return r;
          return "";
        }

        function onLoginScreen() {
          var h = (window.location.hash || "").toLowerCase();
          return !h || h === "" || h === "#" || h === "#login" || /login/.test(h);
        }

        function ensureRoot() {
          var root = document.getElementById("pdm-root");
          if (root) return root;
          root = document.createElement("div");
          root.id = "pdm-root";
          document.body.appendChild(root);
          return root;
        }

        function renderFab() {
          var r = role();
          state.role = r;
          var root = ensureRoot();
          var existing = document.getElementById("pdm-fab");
          if (!r || onLoginScreen()) { if (existing) existing.remove(); return; }
          if (!existing) {
            var btn = document.createElement("button");
            btn.id = "pdm-fab";
            btn.type = "button";
            btn.className = "pdm-fab" + (r === "diocese" ? " pdm-fab--diocese" : "");
            btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>'
              + '<span class="pdm-fab__label">' + (r === "diocese" ? "Chat with Parishes" : "Chat with Diocesan") + '</span>'
              + '<span id="pdm-fab-badge" class="pdm-fab__badge" style="display:none">0</span>';
            btn.addEventListener("click", togglePanel);
            root.appendChild(btn);
          } else {
            existing.className = "pdm-fab" + (r === "diocese" ? " pdm-fab--diocese" : "");
            var lbl = existing.querySelector(".pdm-fab__label");
            if (lbl) lbl.textContent = r === "diocese" ? "Chat with Parishes" : "Chat with Diocesan";
          }
          updateBadge();
        }

        function updateBadge() {
          var b = document.getElementById("pdm-fab-badge");
          if (!b) return;
          if (state.unreadTotal > 0) {
            b.textContent = state.unreadTotal > 99 ? "99+" : String(state.unreadTotal);
            b.style.display = "inline-block";
          } else {
            b.style.display = "none";
          }
        }

        function togglePanel() {
          state.open = !state.open;
          if (state.open) {
            renderPanel();
            loadThreads();
            startPolling();
          } else {
            closePanel();
          }
        }

        function closePanel() {
          state.open = false;
          var p = document.getElementById("pdm-panel");
          if (p) p.remove();
          stopPolling();
        }

        function startPolling() {
          stopPolling();
          pollThreadsTimer = setInterval(loadThreads, 7000);
          if (state.activeParishId) {
            pollMessagesTimer = setInterval(function () { loadMessages(state.activeParishId, true); }, 5000);
          }
        }
        function stopPolling() {
          if (pollThreadsTimer) clearInterval(pollThreadsTimer);
          if (pollMessagesTimer) clearInterval(pollMessagesTimer);
          pollThreadsTimer = null; pollMessagesTimer = null;
        }

        function renderPanel() {
          var r = role();
          if (!r) { closePanel(); return; }
          var root = ensureRoot();
          var existing = document.getElementById("pdm-panel");
          if (existing) existing.remove();
          var panel = document.createElement("div");
          panel.id = "pdm-panel";
          panel.className = "pdm-panel" + (r === "diocese" ? " pdm-panel--diocese" : "");
          var title = r === "diocese"

          var subtitle = r === "diocese"
            ? (state.activeParishId ? "Direct message" : "All parishes")
            : "Direct message";
          panel.innerHTML =
            '<div class="pdm-panel__head">' +
              '<div style="flex:1">' +
                '<div class="pdm-panel__subtitle">' + (r === "diocese" ? "Diocesan Inbox" : "Parish Inbox") + '</div>' +
                '<div class="pdm-panel__title">' + escapeHtml(title) + '</div>' +
              '</div>' +
              '<button class="pdm-panel__close" id="pdm-close" aria-label="Close">&times;</button>' +
            '</div>' +
            '<div class="pdm-panel__body" id="pdm-body"></div>';
          root.appendChild(panel);
          document.getElementById("pdm-close").addEventListener("click", closePanel);
          renderBody();
        }

        function escapeHtml(s) {
          return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
            return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
          });
        }

        function renderBody() {
          var body = document.getElementById("pdm-body");
          if (!body) return;
          var r = role();

          if (state.error) {

          if (r === "diocese" && !state.activeParishId) {

            if (state.loadingThreads && state.threads.length === 0) {

              body.innerHTML = '<div class="pdm-empty"><strong>No parishes yet.</strong><div style="margin-top:6px">Seed the parishes table to start chatting.</div></div>';
              return;

            var listHtml = '<div class="pdm-threads">';
            state.threads.forEach(function (t) {
              listHtml += '<div class="pdm-thread" data-parish-id="' + escapeHtml(t.parish_id) + '" data-parish-name="' + escapeHtml(t.parish_name || "Parish") + '">' +
                '<div class="pdm-thread__avatar">' + escapeHtml(initials(t.parish_name)) + '</div>' +
                '<div class="pdm-thread__meta">' +
                  '<div class="pdm-thread__name">' + escapeHtml(t.parish_name || "Parish") + '</div>' +
                  '<div class="pdm-thread__last">' + escapeHtml(t.last_message_text || "No messages yet.") + '</div>' +
                '</div>' +
                (Number(t.unread_for_me) > 0 ? '<div class="pdm-thread__unread">' + t.unread_for_me + '</div>' : '<div class="pdm-thread__time">' + escapeHtml(fmtTime(t.last_message_at)) + '</div>') +
              '</div>';
            });
            listHtml += '</div>';
            body.innerHTML = listHtml;
            Array.prototype.forEach.call(body.querySelectorAll(".pdm-thread"), function (el) {
              el.addEventListener("click", function () {
                openThread(el.getAttribute("data-parish-id"), el.getAttribute("data-parish-name"));
              });
            });
            return;
          }

          // Active conversation (parish users always land here; diocese too when a thread is open)
          var html = "";
          if (r === "diocese") {
            html += '<button class="pdm-chat__back" id="pdm-back">&larr; Back to parishes</button>';
          }
          html += '<div class="pdm-messages" id="pdm-messages"></div>';
          html += '<form class="pdm-compose" id="pdm-compose">' +
                    '<textarea id="pdm-text" placeholder="Type a message..." rows="1"></textarea>' +
                    '<button type="submit" class="pdm-compose__send" id="pdm-send" aria-label="Send">' +
                      '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>' +
                    '</button>' +
                  '</form>';
          body.innerHTML = html;
          if (r === "diocese") {
            var back = document.getElementById("pdm-back");
            if (back) back.addEventListener("click", function () { state.activeParishId = null; state.activeParishName = ""; state.messages = []; renderPanel(); loadThreads(); });
          }
          var f = document.getElementById("pdm-compose");
          f.addEventListener("submit", function (ev) { ev.preventDefault(); onSend(); });
          var ta = document.getElementById("pdm-text");
          ta.addEventListener("keydown", function (ev) {
            if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); onSend(); }
          });
          renderMessages(true);
        }

        function renderMessages(scrollBottom) {
          var box = document.getElementById("pdm-messages");
          if (!box) return;
          if (state.loadingMessages && state.messages.length === 0) {
            box.innerHTML = '<div class="pdm-empty"><span class="pdm-spinner"></span><div style="margin-top:8px">Loading messages...</div></div>';
            return;
          }
          if (state.messages.length === 0) {
            box.innerHTML = '<div class="pdm-empty"><strong>Say hello!</strong><div style="margin-top:6px">No messages in this thread yet.</div></div>';
            return;
          }
          var html = "";
          state.messages.forEach(function (m) {
            var mine = !!m.is_mine;
            html += '<div class="pdm-msg ' + (mine ? "pdm-msg--me" : "pdm-msg--them") + '">' +
                      escapeHtml(m.message_text) +
                      '<div class="pdm-msg__meta">' + (mine ? "You" : escapeHtml(m.sender_name || m.sender_email || (m.sender_role === "diocese" ? "Diocese" : "Parish"))) + ' &middot; ' + escapeHtml(fmtTime(m.created_at)) + '</div>' +
                    '</div>';
          });
          box.innerHTML = html;
          if (scrollBottom) box.scrollTop = box.scrollHeight;
        }

        function openThread(parishId, parishName) {
          state.activeParishId = parishId;
          state.activeParishName = parishName || "";
          state.messages = [];
          state.loadingMessages = true;
          renderPanel();
          loadMessages(parishId, false).then(function () {
            rpc("pdm_mark_thread_read", { p_parish_id: parishId }).catch(function () {});
            loadThreads();
          });
          stopPolling();
          startPolling();
        }

        function loadThreads() {
          if (!role()) return Promise.resolve();
          state.loadingThreads = true;
          state.error = null;
          return rpc("pdm_list_threads", {}).then(function (rows) {
            state.threads = Array.isArray(rows) ? rows : [];
            state.unreadTotal = state.threads.reduce(function (a, t) { return a + Number(t.unread_for_me || 0); }, 0);
            state.loadingThreads = false;
            updateBadge();
            // For parish users: auto-select their single parish thread
            if (role() === "parish" && !state.activeParishId && state.threads.length > 0) {
              state.activeParishId = state.threads[0].parish_id;
              state.activeParishName = state.threads[0].parish_name || "";
              if (state.open) loadMessages(state.activeParishId, false);
            }
            if (state.open && (role() === "diocese" && !state.activeParishId)) renderBody();
          }).catch(function (e) {
            state.loadingThreads = false;
            state.error = e && e.message ? e.message : "Network error";
            if (state.open) renderBody();
          });
        }

        function loadMessages(parishId, isPoll) {
          if (!parishId) return Promise.resolve();
          if (!isPoll) state.loadingMessages = true;
          return rpc("pdm_list_messages", { p_parish_id: parishId, p_limit: 200, p_offset: 0 }).then(function (rows) {
            var next = Array.isArray(rows) ? rows : [];
            var grew = next.length > state.messages.length;
            state.messages = next;
            state.loadingMessages = false;
            if (state.open && state.activeParishId === parishId) renderMessages(grew || !isPoll);
            if (grew && isPoll) {
              rpc("pdm_mark_thread_read", { p_parish_id: parishId }).catch(function () {});
              loadThreads();
            }
          }).catch(function (e) {
            state.loadingMessages = false;
            state.error = e && e.message ? e.message : "Network error";
            if (state.open) renderMessages(false);
          });
        }

        function onSend() {
          if (state.sending) return;
          var ta = document.getElementById("pdm-text");
          var btn = document.getElementById("pdm-send");
          if (!ta) return;
          var txt = (ta.value || "").trim();
          if (!txt) return;
          if (!state.activeParishId && role() === "diocese") return;

          state.sending = true;
          if (btn) btn.disabled = true;
          var parishId = state.activeParishId;
          if (role() === "parish" && !parishId) {
            if (state.threads[0]) parishId = state.threads[0].parish_id;
          }

          rpc("pdm_send_message", { p_parish_id: parishId, p_message_text: txt }).then(function () {
            ta.value = "";
            state.sending = false;
            if (btn) btn.disabled = false;
            return loadMessages(parishId, false).then(function () { loadThreads(); });
          }).catch(function (e) {
            state.sending = false;
            if (btn) btn.disabled = false;
            state.error = e && e.message ? e.message : "Could not send message";
            renderMessages(false);
          });
        }

        // Background badge updater -- runs even when the panel is closed,
        // so the unread count on the FAB stays live.
        function tickBadge() {
          if (!role() || onLoginScreen()) return;
          if (state.open) return;
          rpc("pdm_list_threads", {}).then(function (rows) {
            var arr = Array.isArray(rows) ? rows : [];
            state.unreadTotal = arr.reduce(function (a, t) { return a + Number(t.unread_for_me || 0); }, 0);
            updateBadge();
          }).catch(function () {});
        }

        function syncAll() {
          renderFab();
          if (state.open && !role()) closePanel();
        }

        if (document.readyState === "complete" || document.readyState === "interactive") {
          setTimeout(syncAll, 400);
        } else {
          document.addEventListener("DOMContentLoaded", function () { setTimeout(syncAll, 400); });
        }
        window.addEventListener("hashchange", syncAll);
        setInterval(syncAll, 1500);
        setInterval(tickBadge, 10000);
      })();
    </script>

    <script>

    <!-- ================================================================

    <script>
      (function () {
        var KEY = "diocese-dashboard-db-session";

        var PUB = "sb_publishable_865CAmJ0g9wUj9dlCo6phQ_l5biuRKK";

        var lastWrap = null;

          return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
            return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
          });
        }

        function getSession() {
          try {
            var raw = window.sessionStorage.getItem(KEY);
            if (!raw) return null;
            var s = JSON.parse(raw);
            return s && typeof s === "object" ? s : null;
          } catch (e) { return null; }
        }
        function role() {
          var s = getSession();
          return (s && s.role) || "";
        }
        function parishName() {
          var s = getSession();
          return (s && (s.parish_name || (s.user && s.user.user_metadata && (s.user.user_metadata.parish_name || (s.user.user_metadata.pending_registration && s.user.user_metadata.pending_registration.parish_name))))) || "";
        }

        function rpc(fn, body) {
          var s = getSession();
          var tok = (s && s.accessToken) || PUB;
          return fetch(URL + "/rest/v1/rpc/" + fn, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json",
              "apikey": PUB,
              "Authorization": "Bearer " + tok
            },
            body: JSON.stringify(body || {})

            return r.text().then(function (t) {
              var data = null;
              try { data = t ? JSON.parse(t) : null; } catch (e) { data = { message: t }; }

                var err = new Error(msg); err.status = r.status; err.payload = data;
                throw err;

          if (!iso) return "";

            if (d >= today) return "Today - " + d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

              '<li class="plh-item' + (live ? " plh-item--live" : "") + '">' +
                '<span class="plh-item__dot" aria-hidden="true"></span>' +
                '<div class="plh-item__meta">' +
                  '<div class="plh-item__top">' +
                    '<span>' + escHtml(r.parish_name || "Parish") + '</span>' +
                    '<span class="plh-item__badge">' + (live ? "Live now" : escHtml(r.duration_label || "Ended")) + '</span>' +
                  '</div>' +
                  '<div class="plh-item__bottom">' +
                    '<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + escHtml(fmtDate(r.started_at)) + '</span>' +
                    (r.ended_at ? '<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>' + escHtml(fmtDate(r.ended_at)) + '</span>' : '') +
                    '<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Peak ' + Number(r.peak_viewer_count || 0) + '</span>' +
                    (r.started_by_name ? '<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' + escHtml(r.started_by_name) + '</span>' : '') +
                  '</div>' +
                '</div>' +
              '</li>';

        function refresh(forceSpinner) {
          var wrap = lastWrap;
          if (!wrap) return;
          if (forceSpinner) {
            var list = wrap.querySelector("#plh-list");
            if (list) list.innerHTML = '<li class="plh-loading"><span class="plh-spinner"></span>Loading history...</li>';
          }
          var r = role();
          var pn = parishName();
          var scopeName = (r === "parish" && pn) ? pn : null;

          Promise.all([
            rpc("list_parish_livestream_history", { p_parish_name: scopeName, p_limit: 30, p_offset: 0 }),
            rpc("parish_livestream_stats", { p_parish_name: scopeName })
          ]).then(function (res) {
            var rows = Array.isArray(res[0]) ? res[0] : [];
            var stats = Array.isArray(res[1]) ? res[1][0] : res[1];
            renderStats(wrap, stats);
            renderList(wrap, rows, null);
          }).catch(function (err) {
            renderStats(wrap, null);
            renderList(wrap, null, err);
          });
        }

        function tick() {
          // Only work when the Live Stream Control card is actually
          // visible somewhere on the page (i.e. the user navigated to
          // the Parish Live Stream section).
          var card = findLiveCard();
          if (!card) {
            if (lastWrap) { lastWrap.remove(); lastWrap = null; }
            return;
          }
          if (!lastWrap || !document.body.contains(lastWrap)) {
            lastWrap = inject();
            if (lastWrap) refresh(true);
          } else {
            refresh(false);
          }
        }

        function start() {
          tick();
          pollTimer = setInterval(tick, 12000);
          // Immediate scan on hash changes too, since navigating between
          // sections replaces the dashboard body.
          window.addEventListener("hashchange", function () {
            if (lastWrap && !document.body.contains(lastWrap)) lastWrap = null;
            setTimeout(tick, 300);
          });
          // Initial re-scan after the React bundle mounts.
          setTimeout(tick, 1500);
          setTimeout(tick, 3500);
        }

        if (document.readyState === "complete" || document.readyState === "interactive") {
          setTimeout(start, 600);
        } else {
          document.addEventListener("DOMContentLoaded", function () { setTimeout(start, 600); });
        }
      })();
    </script>

    <!-- ================================================================

         `parish_name=eq.<name>`, which returns 0 whenever the stored
         name doesn't exactly match. This script detects when the

         the session's parish_id, and swaps the displayed numbers

    <script>
      (function () {
        var SESSION_KEY = "diocese-dashboard-db-session";
        var SUPABASE_URL = "https://lnipoknkbjcxwnggzrnm.supabase.co";
        var SUPABASE_KEY = "sb_publishable_865CAmJ0g9wUj9dlCo6phQ_l5biuRKK";

        function getSession() {
          try {
            var raw = window.sessionStorage.getItem(SESSION_KEY);
            if (raw) return JSON.parse(raw);
          } catch (e) {}
          try {
            var raw2 = window.localStorage.getItem(SESSION_KEY);
            if (raw2) return JSON.parse(raw2);
          } catch (e) {}
          return null;
        }
        function parishIdFromSession() {
          var s = getSession();
          if (!s) return null;

        }

        function rpc(fn, body) {
          var s = getSession();
          var tok = (s && s.accessToken) || SUPABASE_KEY;
          return fetch(SUPABASE_URL + "/rest/v1/rpc/" + fn, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json",
              "apikey": SUPABASE_KEY,
              "Authorization": "Bearer " + tok
            },
            body: JSON.stringify(body || {})
          }).then(function (r) {
            return r.text().then(function (t) {
              var data = null; try { data = t ? JSON.parse(t) : null; } catch (e) {}
              if (!r.ok) { var err = new Error((data && (data.message || data.hint)) || ("HTTP " + r.status)); err.payload = data; throw err; }
              return data;

        function tileHtml(cls, kind, label, value, note) {
          return '<button type="button" class="prb-tile ' + cls + '" data-kind="' + kind + '" data-reports-kind="' + kind + '" data-reports-action="open" aria-label="View ' + label + '">' +
                   '<div class="prb-tile__icon">' + (PRB_ICON[kind] || '') + '</div>' +

                 '</button>';
        }

        // ---- Filter state (applies to the stats + the detail modal) ----
        var prbFilter = {
          from: firstOfMonth(),
          to:   todayIso(),
          status: '',
          search: ''
        };
        function todayIso() {
          var d = new Date();
          return d.toISOString().slice(0, 10);
        }
        function firstOfMonth() {
          var d = new Date();
          d.setDate(1);
          return d.toISOString().slice(0, 10);
        }
        function escapeHtml(s) {
          return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        function fmtDate(v) {
          if (!v) return '—';
          try {
            var d = new Date(v);
            if (isNaN(d)) return String(v);
            return d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: '2-digit' });
          } catch (e) { return String(v); }
        }
        function statusChip(s) {
          var t = (s || '').toLowerCase();

          if (/pending|review|correction/.test(t)) cls += ' prb-chip--pending';
          else if (/complete|done|released|approved/.test(t)) cls += ' prb-chip--completed';

          // Toolbar

            '<label>Status</label>' +

            tileHtml("prb-tile--small",   "archive",       "Archive records",      "0", "Baptism / Confirmation / Marriage"),
            tileHtml("prb-tile--small",   "chapels",       "Chapels",              "0", "Under this parish"),

          return card;

        function onFilterChange(e) {
          var el = e.target.closest("[data-prb-f]");

          var key = el.getAttribute("data-prb-f");

        function cellValue(row, col) {

        function openDetail(kind) {

                '<button class="prb-btn prb-btn--ghost" data-prb-modal-close>Close</button>' +

            } else {
              var head = '<tr>' + meta.cols.map(function (c) { return '<th>' + escapeHtml(c.head) + '</th>'; }).join('') + '</tr>';
